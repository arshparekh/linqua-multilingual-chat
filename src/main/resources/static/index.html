<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linqua — Real-Time Translation Chat</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- ═══════════════════════════════════════════════════════════════
         LANDING VIEW  (#join-screen)
         chat.js binds to this ID — do not rename.
         Contains: sticky nav, hero section, and join/room portal.
    ═══════════════════════════════════════════════════════════════ -->
    <div id="join-screen" class="join-screen">

        <!-- ── Sticky Top Navigation Bar ── -->
        <nav class="top-nav" aria-label="Primary navigation">
            <a href="#" class="nav-brand" aria-label="Linqua home">Linqua</a>

            <!-- Theme toggle -->
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <!-- Sun icon (shown in dark mode) -->
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </nav>

        <!-- ── Hero Section (above the fold) ── -->
        <section class="hero-section" aria-label="Hero">
            <div class="hero-content">
                <!-- Animated morphing word — the page signature -->
                <div class="hero-label" aria-hidden="true">Real-time translation</div>
                <h1 class="hero-word" id="hero-word" aria-label="Chat">
                    <span class="hero-word-inner" aria-hidden="true">Chat</span>
                </h1>
                <p class="hero-sub">
                    Type in your language.<br>Everyone reads in theirs.
                </p>

                <!-- Scroll cue -->
                <a href="#portal" class="scroll-cue" aria-label="Scroll to join">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </a>
            </div>
        </section>

        <!-- ── Portal Section (below the fold) ── -->
        <!-- chat.js listens to #join-form submit — ID preserved -->
        <section class="portal-section" id="portal" aria-label="Join or start a chat">
            <div class="portal-container">

                <!-- Tab switcher: New Room / Join Room -->
                <div class="portal-tabs" role="tablist">
                    <button class="portal-tab active" id="tab-new" role="tab" aria-selected="true" aria-controls="panel-new" data-tab="new">
                        New room
                    </button>
                    <button class="portal-tab" id="tab-join" role="tab" aria-selected="false" aria-controls="panel-join" data-tab="join">
                        Join room
                    </button>
                    <span class="tab-indicator" aria-hidden="true"></span>
                </div>

                <!-- ── New Room Panel ── -->
                <div class="portal-panel active" id="panel-new" role="tabpanel" aria-labelledby="tab-new">
                    <!-- #join-form: ID preserved for chat.js -->
                    <form id="join-form" class="portal-form" novalidate>

                        <div class="field-group">
                            <label class="field-label" for="username">Your name</label>
                            <input class="field-input" type="text" id="username" name="username" placeholder="e.g. Arjun" maxlength="30" required autocomplete="off" spellcheck="false">
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="language">Your language</label>
                            <div class="select-wrapper">
                                <select class="field-input field-select" id="language" name="language" required>
                                    <option value="en">English</option>
                                    <option value="es">Spanish</option>
                                    <option value="fr">French</option>
                                    <option value="de">German</option>
                                    <option value="it">Italian</option>
                                    <option value="pt">Portuguese</option>
                                    <option value="ja">Japanese</option>
                                    <option value="ko">Korean</option>
                                    <option value="zh">Chinese</option>
                                    <option value="ar">Arabic</option>
                                    <option value="hi">Hindi</option>
                                </select>
                                <!-- Custom chevron -->
                                <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>

                        <!-- room-code field hidden in new-room flow; required by spec for join flow -->
                        <input type="hidden" id="room-code" name="room-code" value="">

                        <button type="submit" class="btn-primary" id="btn-create-room">
                            Create private room
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- ── Join Existing Room Panel ── -->
                <div class="portal-panel" id="panel-join" role="tabpanel" aria-labelledby="tab-join">
                    <form class="portal-form" id="join-room-form" novalidate>

                        <div class="field-group">
                            <!-- Reuses #username — chat.js reads this -->
                            <label class="field-label" for="username-join">Your name</label>
                            <input class="field-input" type="text" id="username-join" placeholder="e.g. María" maxlength="30" autocomplete="off" spellcheck="false">
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="language-join">Your language</label>
                            <div class="select-wrapper">
                                <select class="field-input field-select" id="language-join">
                                    <option value="en">English</option>
                                    <option value="es">Spanish</option>
                                    <option value="fr">French</option>
                                    <option value="de">German</option>
                                    <option value="it">Italian</option>
                                    <option value="pt">Portuguese</option>
                                    <option value="ja">Japanese</option>
                                    <option value="ko">Korean</option>
                                    <option value="zh">Chinese</option>
                                    <option value="ar">Arabic</option>
                                    <option value="hi">Hindi</option>
                                </select>
                                <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>

                        <div class="field-group">
                            <label class="field-label" for="room-code-join">Room code</label>
                            <input class="field-input field-input--mono" type="text" id="room-code-join" placeholder="e.g. LNQUA-4829" maxlength="20" autocomplete="off" spellcheck="false">
                        </div>

                        <button type="submit" class="btn-primary" id="btn-join-room">
                            Join room
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                                <polyline points="10 17 15 12 10 7"></polyline>
                                <line x1="15" y1="12" x2="3" y2="12"></line>
                            </svg>
                        </button>

                        <!-- Inline error for invalid room code -->
                        <p id="room-code-error" class="room-code-error" style="display:none;"></p>
                    </form>
                </div>

            </div>
            <!-- /.portal-container -->
        </section>
        <!-- /.portal-section -->

    </div>
    <!-- /#join-screen -->


    <!-- ═══════════════════════════════════════════════════════════════
         ACTIVE CHAT WORKSPACE  (#chat-screen)
         chat.js binds to this ID — do not rename.
         Hidden by default; revealed after join.
    ═══════════════════════════════════════════════════════════════ -->
    <div id="chat-screen" class="chat-screen hidden">

        <!-- ── Chat Header ── -->
        <header class="chat-header">
            <div class="chat-header-left">
                <!-- #user-avatar: ID preserved for chat.js -->
                <div class="avatar" id="user-avatar" aria-hidden="true">A</div>
                <div class="chat-header-meta">
                    <!-- #header-name: ID preserved for chat.js -->
                    <span class="chat-header-name" id="header-name">Arjun</span>
                    <span class="chat-header-status">
                        <span class="status-dot" aria-hidden="true"></span>
                    <span class="status-label">Live translation on</span>
                    </span>
                </div>
            </div>

            <div class="chat-header-right">
                <!-- Room code badge (shown when in a private room) -->
                <button class="room-code-badge hidden" id="room-code-badge" onclick="copyRoomCode()" title="Click to copy room code" aria-label="Copy room code">
                    <svg class="room-code-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="room-badge-code" class="room-badge-code"></span>
                    <span class="room-badge-copied">Copied ✓</span>
                </button>

                <!-- Theme toggle -->
                <button class="theme-toggle theme-toggle--inline" id="theme-toggle-chat" aria-label="Toggle dark mode">
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── Message Area ── -->
        <!-- #message-area: ID preserved for chat.js scroll targeting -->
        <main class="chat-messages" id="message-area" aria-live="polite" aria-label="Chat messages">
            <!-- #message-list: ID preserved for chat.js appendChild calls -->
            <ul id="message-list" class="message-list" aria-label="Messages"></ul>
        </main>

        <!-- ── Composer / Input Area ── -->
        <footer class="chat-composer">
            <!-- #message-form: ID preserved for chat.js -->
            <form id="message-form" class="composer-form" novalidate>
                <!-- #message-input: ID preserved for chat.js -->
                <input class="composer-input" type="text" id="message-input" placeholder="Write in your language…" autocomplete="off" maxlength="1000" spellcheck="true">
                <button type="submit" class="composer-send" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>

    </div>
    <!-- /#chat-screen -->

    <!-- ── External deps: SockJS + STOMP ── -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- ── UI interaction script (inline, small) ── -->
    <script>
        /* ────────────────────────────────────────────────
                                   THEME TOGGLE
                                ──────────────────────────────────────────────── */
        const root = document.documentElement;
        const stored = localStorage.getItem('lq-theme');
        if (stored) root.setAttribute('data-theme', stored);

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            localStorage.setItem('lq-theme', theme);
        }

        function toggleTheme() {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        }

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('theme-toggle-chat').addEventListener('click', toggleTheme);

        /* Respect OS preference if nothing stored */
        if (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            applyTheme('dark');
        }

        /* ────────────────────────────────────────────────
           PORTAL TABS  (New room / Join room)
        ──────────────────────────────────────────────── */
        const tabs = document.querySelectorAll('.portal-tab');
        const panels = document.querySelectorAll('.portal-panel');
        const indicator = document.querySelector('.tab-indicator');

        function activateTab(btn) {
            tabs.forEach(t => {
                t.classList.remove('active');
                t.setAttribute('aria-selected', 'false');
            });
            panels.forEach(p => p.classList.remove('active'));

            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
            document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
            moveIndicator(btn);
        }

        function moveIndicator(btn) {
            indicator.style.left = btn.offsetLeft + 'px';
            indicator.style.width = btn.offsetWidth + 'px';
        }

        tabs.forEach(t => t.addEventListener('click', () => activateTab(t)));

        /* Initial indicator position */
        window.addEventListener('DOMContentLoaded', () => {
            const active = document.querySelector('.portal-tab.active');
            if (active) moveIndicator(active);
        });

        /* ────────────────────────────────────────────────
           HERO WORD  — glitch / morph animation
           Cycles: Chat → Charlar → Discuter → 聊天 → बात → Bate-papo → Chat
        ──────────────────────────────────────────────── */
        const words = ['Chat', 'Charlar', 'Discuter', '聊天', 'बात', 'Bate papo', 'ಹರಟೆ'];
        const GLITCH_CHARS = '!<>-_\\/[]{}—=+*^?#░▒▓';
        const heroEl = document.getElementById('hero-word').querySelector('.hero-word-inner');

        let wordIndex = 0;
        let isAnimating = false;

        function scrambleTo(target) {
            if (isAnimating) return;
            isAnimating = true;

            const current = heroEl.textContent;
            const maxLen = Math.max(current.length, target.length);
            let iteration = 0;
            const totalFrames = maxLen * 4;

            const interval = setInterval(() => {
                heroEl.textContent = target
                    .split('')
                    .map((char, i) => {
                        /* Reveal characters progressively from left */
                        if (i < Math.floor(iteration / 4)) return char;
                        /* Replace unrevealed chars with glitch characters */
                        return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
                    })
                    .join('');

                iteration++;

                if (iteration >= totalFrames) {
                    clearInterval(interval);
                    heroEl.textContent = target;
                    isAnimating = false;
                }
            }, 40);
        }

        /* Cycle every 2.8 seconds */
        setInterval(() => {
            wordIndex = (wordIndex + 1) % words.length;
            scrambleTo(words[wordIndex]);
        }, 2800);

        /* ────────────────────────────────────────────────
           JOIN-ROOM FORM — now fully handled by chat.js
           (no mirroring needed; chat.js reads own fields)
        ──────────────────────────────────────────────── */
    </script>

    <!-- ── App logic: provided by developer ── -->
    <script src="/js/chat.js"></script>
</body>

</html>
