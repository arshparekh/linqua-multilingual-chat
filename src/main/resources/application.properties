server.port=8081

# Google Cloud Translation API key
# Get one at: https://console.cloud.google.com/apis/credentials
# Enable "Cloud Translation API" for your project first.
google.translate.api-key=${GOOGLE_TRANSLATE_API_KEY:}

google.translate.demo-mode=true

# Node sidecar translation
node.translation.enabled=true
# In Docker use the node binary installed in the image.
# In local dev you can override this property if needed.
node.translation.node-executable=node
node.translation.script=node/translate.js

